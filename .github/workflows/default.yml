name: Default CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    environment: ci
    env:
      APP_KEY: ${{ vars.APP_KEY }}
      DB_DATABASE: ${{ vars.DB_DATABASE }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USER: ${{ vars.DB_USER }}
      HOST: ${{ vars.HOST }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      SESSION_DRIVER: ${{ vars.SESSION_DRIVER }}
      DRIVE_DISK: ${{ vars.DRIVE_DISK }}
      SPACES_KEY: ${{ secrets.SPACES_KEY }}
      SPACES_SECRET: ${{ secrets.SPACES_SECRET }}
      SPACES_REGION: ${{ vars.SPACES_REGION }}
      SPACES_BUCKET: ${{ vars.SPACES_BUCKET }}
      SPACES_ENDPOINT: ${{ vars.SPACES_ENDPOINT }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_REGION: ${{ vars.S3_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}

    strategy:
      matrix:
        node-version: [24.x]

    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_USER: ${{ vars.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ vars.DB_DATABASE }}
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - name: Verify package-lock.json is up to date
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json || {
            echo "❌ package-lock.json and package.json are out of sync!"
            echo "ℹ️ Run 'npm install' and commit the updated package-lock.json"
            exit 1
          }

  build:
    runs-on: ubuntu-latest
    environment: ci

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
