# Source RPG BIO de secours (si absent de l'étape fetch-bio quand le millésime RPG ne contient pas de couche BIO.
# Dataset data.gouv.fr : "Parcelles en agriculture biologique (AB) déclarées à la PAC"
# Disponible pour les millésimes 2019–2023, formats GPKG (2021+) et SHP (2019-2020).
# L'API est interrogée dynamiquement à l'exécution :
#   https://www.data.gouv.fr/api/1/datasets/616d6531c2951bbe8bd97771/
bio_fallback_dataset: '616d6531c2951bbe8bd97771'

# Mapping : nom de table GeoPackage → nom de source-layer dans le PMTiles
# Seuls RPG PAC et RPG BIO sont traités (les autres layers sont ignorés).
#
# Couche GeoPackage (exemple 2024)   → source-layer PMTiles
# ──────────────────────────────────────────────────────────
# *pac* / *parcelles_agricoles*      → parcelles        (couche principale, RPG PAC)
# *bio*                              → parcellesbio     (RPG BIO)

# Options tippecanoe
tippecanoe:
  min_zoom: 5
  max_zoom: 14
